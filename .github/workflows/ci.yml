name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: 10.10.0

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Type-Check
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

            - name: Format check
              run: pnpm format:check

            - name: Test
              run: pnpm test

            - name: Build
              run: pnpm build
