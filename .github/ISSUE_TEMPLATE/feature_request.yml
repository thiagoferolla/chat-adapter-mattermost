name: Feature Request
description: Suggest a feature for chat-adapter-mattermost
labels: ["enhancement"]
body:
    - type: markdown
      attributes:
          value: |
              Thank you for suggesting a feature! Please describe your idea.
    - type: textarea
      id: problem
      attributes:
          label: Problem / Motivation
          description: What problem does this feature solve? Is your feature request related to a problem?
          placeholder: I'm frustrated when...
      validations:
          required: true
    - type: textarea
      id: solution
      attributes:
          label: Proposed Solution
          description: Describe the solution you'd like
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives Considered
          description: What alternative solutions have you considered?
      validations:
          required: false
    - type: textarea
      id: additional
      attributes:
          label: Additional Context
          description: Any other context, screenshots, or references
      validations:
          required: false
