name: Bug Report
description: Report a bug in chat-adapter-mattermost
labels: ["bug"]
body:
    - type: markdown
      attributes:
          value: |
              Thank you for reporting a bug! Please fill out the sections below.
    - type: textarea
      id: description
      attributes:
          label: Description
          description: A clear description of the bug
      validations:
          required: true
    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          description: How can we reproduce this behavior?
          placeholder: |
              1. Initialize adapter with config...
              2. Send a message to...
              3. Observe error...
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What did you expect to happen?
      validations:
          required: true
    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: What actually happened? Include error messages or logs.
      validations:
          required: true
    - type: input
      id: adapter-version
      attributes:
          label: Adapter Version
          description: What version of chat-adapter-mattermost are you using?
          placeholder: e.g., 1.1.2
      validations:
          required: true
    - type: input
      id: mattermost-version
      attributes:
          label: Mattermost Server Version
          description: What version of Mattermost are you connecting to?
          placeholder: e.g., 10.5.0
      validations:
          required: false
    - type: input
      id: node-version
      attributes:
          label: Node.js Version
          description: What version of Node.js are you running?
          placeholder: e.g., 22.14.0
      validations:
          required: false
    - type: textarea
      id: additional
      attributes:
          label: Additional Context
          description: Any other context, configuration, or screenshots
      validations:
          required: false
